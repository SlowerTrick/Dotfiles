# Max allowed gamma (optional)
max-gamma = 150

# Daytime profile (normal colors)
profile {
    time = 07:30       # Time time at which the profile should activate
    identity = true    # Ignore temperaturere value
    gamma = 1.0        # Brightness
}

# Evening profile
profile {
    time = 20:00
    temperature = 5500 # Screeen mask, lower means warmer (default = 6000)
}

# Night-time profile
profile {
    time = 22:00
    temperature = 5000
    gamma = 0.9
}
