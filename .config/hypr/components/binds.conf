###################
### KEYBINDINGS ###
###################


# Keywords & Modifiers
$mainMod = SUPER 
$ipc = qs -c noctalia-shell ipc call

# 1. MENUS AND APPS
bind = $mainMod, E, exec, $fileManager #"File Manager"
bind = $mainMod, B, exec, $browser #"Browser"
bind = CTRL, SPACE, exec, $ipc launcher toggle #"Launcher"
bind = $mainMod SHIFT, S, exec, $ipc controlCenter toggle #"Control Center"
bind = $mainMod SHIFT, COMMA, exec, $ipc settings toggle #"Settings"
bind = $mainMod, home, exec, qs -c noctalia-shell ipc call sessionMenu toggle #"Logout"
bind = $mainMod CTRL, C, exec, qs -c noctalia-shell ipc call launcher clipboard #"Clipboard"
bind = $mainMod CTRL, E, exec, qs -c noctalia-shell ipc call launcher emoji #"Emoji"
bind = $mainMod CTRL, W, exec, qs -c noctalia-shell ipc call wallpaper toggle #"Wallpaper Selector"
bind = $mainMod CTRL, R, exec, qs -c noctalia-shell ipc call wallpaper random all #"Randomize Wallpaper"
bind = $mainMod, SLASH, exec, qs -c "noctalia-shell" ipc call plugin:keybind-cheatsheet toggle #"Keybinds Cheat Sheet"
bind = $mainMod CTRL, N, exec, ~/.config/noctalia/reload.sh #"Restart Noctalia"

# 2. TERMINAL SHORTCUTS
bind = CTRL ALT, T, exec, $terminal #"Terminal (Home)"

# 3. SCREENSHOT AND COLOR PICKER
bind = ,PRINT, exec, pgrep -x hyprshot || hyprshot -m region -o /home/slower/Pictures/Screenshots/ #"Screenshot Region"
bind = $mainMod, PRINT, exec, pgrep -x hyprshot || hyprshot -m window -o /home/slower/Pictures/Screenshots/ #"Screenshot Window"
bind = $mainMod CTRL, PRINT, exec, pgrep -x hyprshot || hyprpicker -a -n #"Color Picker"

# 4. WINDOW MANAGEMENT
bind = $mainMod, Q, killactive #"Close window"
bind = ALT, f4, killactive #"Close window (Alt+F4)"
bind = $mainMod, F, togglefloating #"Toggle floating"
bind = $mainMod, M, fullscreen, 1 #"Maximize"
bind = $mainMod, N, fullscreen, 0 #"Toggle Fullscreen"
bind = $mainMod, C, centerwindow #"Center window"
bind = $mainMod, TAB, exec, qs ipc -c overview call overview toggle #"Overview"
bind = ALT, TAB, exec, qs ipc -c qs-hyprview call expose toggle 'justified' #"Window Switcher"

# 5. NAVIGATION
bind = $mainMod, h, movefocus, l #"Focus Left"
bind = $mainMod, l, movefocus, r #"Focus Right"
bind = $mainMod, k, movefocus, u #"Focus Up"
bind = $mainMod, j, movefocus, d #"Focus Down"

# 6. WORKSPACES
bind = $mainMod, right, workspace, e+1 #"Next Workspace"
bind = $mainMod, left, workspace, e-1 #"Prev Workspace"
bind = $mainMod, PERIOD, workspace, e+1 #"Next Workspace (>)"
bind = $mainMod, COMMA, workspace, e-1 #"Prev Workspace (<)"
bind = $mainMod SHIFT, right, workspace, empty #"Next Empty Workspace"
bind = $mainMod, 1, workspace, 1 #"Workspace 1"
bind = $mainMod, 2, workspace, 2 #"Workspace 2"
bind = $mainMod, 3, workspace, 3 #"Workspace 3"
bind = $mainMod, 4, workspace, 4 #"Workspace 4"
bind = $mainMod, 5, workspace, 5 #"Workspace 5"
bind = $mainMod, 6, workspace, 6 #"Workspace 6"
bind = $mainMod, 7, workspace, 7 #"Workspace 7"
bind = $mainMod, 8, workspace, 8 #"Workspace 8"
bind = $mainMod, 9, workspace, 9 #"Workspace 9"
bind = $mainMod, 0, workspace, 10 #"Workspace 10"

# 7. MOVE TO WORKSPACE
bind = $mainMod CTRL, 1, movetoworkspace, 1 #"Move to Workspace 1"
bind = $mainMod CTRL, 2, movetoworkspace, 2 #"Move to Workspace 2"
bind = $mainMod CTRL, 3, movetoworkspace, 3 #"Move to Workspace 3"
bind = $mainMod CTRL, 4, movetoworkspace, 4 #"Move to Workspace 4"
bind = $mainMod CTRL, 5, movetoworkspace, 5 #"Move to Workspace 5"
bind = $mainMod CTRL, 6, movetoworkspace, 6 #"Move to Workspace 6"
bind = $mainMod CTRL, 7, movetoworkspace, 7 #"Move to Workspace 7"
bind = $mainMod CTRL, 8, movetoworkspace, 8 #"Move to Workspace 8"
bind = $mainMod CTRL, 9, movetoworkspace, 9 #"Move to Workspace 9"
bind = $mainMod CTRL, 0, movetoworkspace, 10 #"Move to Workspace 10"
bind = $mainMod CTRL, right, movetoworkspace, +1 #"Move to Next Workspace"
bind = $mainMod CTRL, left, movetoworkspace, e-1 #"Move to Prev Workspace"
bind = $mainMod CTRL SHIFT, right, movetoworkspace, empty #"Move to Next Empty Workspace"
bind = $mainMod CTRL, PERIOD, movetoworkspace, +1 #"Move to Next Workspace (>)"
bind = $mainMod CTRL, COMMA, movetoworkspace, e-1 #"Move to Prev Workspace (<)"
bind = $mainMod CTRL SHIFT, PERIOD, movetoworkspace, empty #"Move to Next Empty Workspace (>)"

## Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# 8. WORKSPACE SCROLLING
bind = $mainMod, mouse_down, workspace, e+1 #"Next Workspace (Scroll)"
bind = $mainMod, mouse_up, workspace, e-1 #"Prev Workspace (Scroll)"

# 11. MOUSE BINDINGS
bindm = $mainMod, mouse:272, movewindow #"Move Window"
bindm = $mainMod, mouse:273, resizewindow #"Resize Window"

# 12. MULTIMEDIA AND BRIGHTNESS
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+ #"Volume Up"
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- #"Volume Down"
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle #"Mute Audio"
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle #"Mute Mic"
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ #"Brightness Up"
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- #"Brightness Down"

# 13. MEDIA PLAYER CONTROL
bindl = , XF86AudioNext, exec, playerctl next #"Next Track"
bindl = , XF86AudioPause, exec, playerctl play-pause #"Pause"
bindl = , XF86AudioPlay, exec, playerctl play-pause #"Play"
bindl = , XF86AudioPrev, exec, playerctl previous #"Previous Track"
