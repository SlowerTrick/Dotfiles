#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

#exec-once = mpvpaper ALL ~/Videos/walls/SG.mp4 -o "no-audio" &     # Render Initial Wallpaper
exec-once = systemctl --user start hyprpolkitagent                  # Authentication Agent
exec-once = qs -c noctalia-shell                                    # Start Shell
# exec-once = hyprsunset                                            # Screen Warming Effect
exec-once = wl-paste --type text --watch cliphist store             # Clipboard Manager Setup
exec-once = wl-paste --type image --watch cliphist store            # Clipboard manager Setuo
exec-once = wl-clip-persist --clipboard regular                     # Persistent Clipboard

