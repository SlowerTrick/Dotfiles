[Settings]
language = en
folder = ~/Pictures/walls
monitors = All
wallpaper = ~/Pictures/walls/Lowpoly_Street.png
show_path_in_tooltip = True
backend = swww
fill = stretch
sort = random
color = #62A0EA
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
