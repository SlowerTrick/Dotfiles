format = """\
[╭╴](fg:arrow)\
$username\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$scala\
$swift\
$dart\
$ruby\
$elixir\
$zig\
$lua\
$julia\
$crystal\
$conda\
$cmd_duration
[╰─](fg:arrow)$character\
"""

add_newline = true
palette = "normal"

[palettes.normal]
arrow = "{{colors.primary_fixed_dim.default.hex}}" # C1
os = "{{colors.primary_fixed_dim.default.hex}}" # C1
os_admin = "{{colors.on_primary.default.hex}}" # C2
text_color = "{{colors.surface_dim.default.hex}}" # C6
directory = "{{colors.on_primary.default.hex}}" # C2
text_light = "{{colors.primary_fixed_dim.default.hex}}" # C1
time = "{{colors.tertiary.default.hex}}" # C9
duration = "{{colors.surface_container.default.hex}}" #C4

# Cores dos módulos sincronizadas com a paleta
git = "{{colors.tertiary.default.hex}}"
git_status = "{{colors.tertiary_container.default.hex}}"

node = "{{colors.primary.default.hex}}"

python = "{{colors.secondary.default.hex}}"
rust = "{{colors.secondary_fixed.default.hex}}"

java = "{{colors.tertiary.default.hex}}"
scala = "{{colors.tertiary_fixed.default.hex}}"

c = "{{colors.surface_container_high.default.hex}}"
zig = "{{colors.surface_container_highest.default.hex}}"

dart = "{{colors.primary_container.default.hex}}"
swift = "{{colors.secondary_container.default.hex}}"

ruby = "{{colors.error.default.hex}}"
elixir = "{{colors.tertiary_container.default.hex}}"

lua = "{{colors.primary_fixed_dim.default.hex}}"
julia = "{{colors.secondary_fixed_dim.default.hex}}"

crystal = "{{colors.surface_container.default.hex}}"

[username]
style_user = 'os'
style_root = 'os_admin'
format = '[]($style)[󰣇 $user](bg:$style fg:text_color)[]($style)'
disabled = false
show_always = true

[character]
success_symbol = "[󰍟](fg:arrow)"
error_symbol = "[󰍟](fg:arrow)"

[directory]
format = ' [](fg:directory)[  $path ]($style)[$read_only]($read_only_style)[](fg:directory)'
truncation_length = 2
style = "fg:text_light bg:directory" # Ajustado para text_light pois o fundo é escuro (C2)
read_only_style = "fg:text_light bg:directory"
before_repo_root_style = "fg:text_light bg:directory"
truncation_symbol = "…/"
truncate_to_repo = true
read_only ="  "

[cmd_duration]
format = ' [](fg:duration)[ $duration]($style)[](fg:duration)'
style = "fg:text_light bg:duration"
min_time = 500

[git_branch]
format = ' [](fg:git)[$symbol$branch](fg:text_color bg:git)[](fg:git)'
symbol = " "

[git_status]
format = '([ ](fg:git_status)[$all_status$ahead_behind]($style)[](fg:git_status))'
style = "fg:text_light bg:git_status"

[nodejs]
symbol = ""
style = "bg:node fg:text_color"
format = '[ ](fg:node)[$symbol($version )]($style)[](fg:node)'

[c]
format = '[ ](fg:c)[$symbol$version](bg:c fg:text_color)[](fg:c)'
symbol = " "

[rust]
format = '[ ](fg:rust)[$symbol$version](bg:rust fg:text_color)[](fg:rust)'
symbol = " "

[golang]
format = '[ ](fg:primary_container)[$symbol$version](bg:primary_container fg:text_color)[](fg:primary_container)'
symbol = " "

[python]
format = '[ ](fg:python)[$symbol$version(\\(#$virtualenv\\))](bg:python fg:text_color)[](fg:python)'
symbol = " "

[java]
format = '[ ](fg:java)[$symbol$version](bg:java fg:text_color)[](fg:java)'
symbol = " "

[scala]
symbol = " "
format = '[ ](fg:scala)[$symbol$version](bg:scala fg:text_color)[](fg:scala)'

[swift]
symbol = " "
format = '[ ](fg:swift)[$symbol$version](bg:swift fg:text_color)[](fg:swift)'

[dart]
symbol = " "
format = '[ ](fg:dart)[$symbol$version](bg:dart fg:text_color)[](fg:dart)'

[ruby]
symbol = " "
format = '[ ](fg:ruby)[$symbol$version](bg:ruby fg:text_color)[](fg:ruby)'

[elixir]
symbol = " "
format = '[ ](fg:elixir)[$symbol$version](bg:elixir fg:text_color)[](fg:elixir)'

[zig]
symbol = " "
format = '[ ](fg:zig)[$symbol$version](bg:zig fg:text_color)[](fg:zig)'

[lua]
symbol = " "
format = '[ ](fg:lua)[$symbol$version](bg:lua fg:text_color)[](fg:lua)'

[julia]
symbol = " "
format = '[ ](fg:julia)[$symbol$version](bg:julia fg:text_color)[](fg:julia)'

[crystal]
symbol = " "
format = '[ ](fg:crystal)[$symbol$version](bg:crystal fg:text_color)[](fg:crystal)'

[os.symbols]
Alpine = " "
Amazon = " "
Android = " "
Arch = " "
CentOS = " "
Debian = " "
DragonFly = " "
Emscripten = " "
EndeavourOS = " "
Fedora = " "
FreeBSD = " "
Gentoo = " "
Linux = " "
Macos = "#ddc66e"
Manjaro = " "
Mariner = " "
MidnightBSD = " "
Mint = " "
NetBSD = " "
NixOS = " "
openSUSE = " "
Pop = " "
Raspbian = " "
Redhat = " "
RedHatEnterprise = " "
Redox = " "
SUSE = " "
Ubuntu = " "
Unknown = " "
Windows = " "

[package]
disabled = true
